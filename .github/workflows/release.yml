name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.3. Leave empty to use Packaging/release.env."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish release
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve and validate release metadata
        run: |
          set -euo pipefail
          source Packaging/release.env
          expected_tag="v${CIPHERNOTES_VERSION}"
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="${{ inputs.tag }}"
            if [ -z "${release_tag}" ]; then
              release_tag="${expected_tag}"
            fi
          fi
          if [ "${release_tag}" != "${expected_tag}" ]; then
            echo "Release tag ${release_tag} does not match Packaging/release.env version ${expected_tag}" >&2
            exit 1
          fi
          Packaging/validate-release.sh --tag "${release_tag}"
          {
            echo "RELEASE_TAG=${release_tag}"
            echo "RELEASE_VERSION=${CIPHERNOTES_VERSION}"
            echo "RELEASE_NAME=${CIPHERNOTES_RELEASE_NAME}"
          } >> "$GITHUB_ENV"

      - name: Build installer and archive
        run: Packaging/build-release.sh

      - name: Prepare release assets
        run: |
          set -euo pipefail
          rm -rf release-assets
          mkdir -p release-assets
          cp "outputs/密笺安装器.pkg" "release-assets/CipherNotes-installer.pkg"
          cp "outputs/密笺-macOS.zip" "release-assets/CipherNotes-macOS.zip"
          cp "outputs/发布说明.md" "release-assets/release-notes.md"
          cp "outputs/使用说明.md" "release-assets/user-guide.md"
          cp "outputs/产品介绍.html" "release-assets/product-page.html"
          cp "outputs/密笺图标.png" "release-assets/icon.png"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CipherNotes-release
          path: |
            release-assets/*

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="CipherNotes ${RELEASE_VERSION} - ${RELEASE_NAME}"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${title}" \
              --notes-file Packaging/RELEASE_NOTES.md \
              --target "${GITHUB_SHA}" \
              --latest
          else
            gh release create "${RELEASE_TAG}" \
              --title "${title}" \
              --notes-file Packaging/RELEASE_NOTES.md \
              --target "${GITHUB_SHA}" \
              --latest
          fi
          gh release upload "${RELEASE_TAG}" \
            release-assets/CipherNotes-installer.pkg \
            release-assets/CipherNotes-macOS.zip \
            release-assets/release-notes.md \
            release-assets/user-guide.md \
            release-assets/product-page.html \
            release-assets/icon.png \
            --clobber
