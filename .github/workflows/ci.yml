name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Swift tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Prepare SwiftPM cache
        run: |
          mkdir -p "$RUNNER_TEMP/swiftpm-cache"
          mkdir -p "$RUNNER_TEMP/ciphernotes-test"

      - name: Validate release metadata
        run: Packaging/validate-release.sh

      - name: Run tests
        run: swift test --scratch-path "$RUNNER_TEMP/ciphernotes-test"
        env:
          SWIFTPM_HOME: ${{ runner.temp }}/swiftpm-cache
